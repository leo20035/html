<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具入口網站 - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 4rem;
      animation: fadeInDown 0.8s ease-out;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 1.2rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      width: 100%;
      max-width: 1200px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      animation: fadeIn 1s ease-out backwards;
    }

    /* Animation delays for cards */
    .card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease-out;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .card:hover::before {
      transform: scaleX(1);
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      background: -webkit-linear-gradient(#818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .card h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .card p {
      color: var(--text-muted);
      line-height: 1.6;
      flex-grow: 1;
    }

    .card-action {
      margin-top: 2rem;
      font-weight: 600;
      color: #818cf8;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: gap 0.3s ease;
    }

    .card:hover .card-action {
      gap: 0.8rem;
    }

    /* Disabled state for placeholders */
    .card.disabled {
      opacity: 0.6;
      cursor: default;
      pointer-events: none;
    }

    .card.disabled .card-action {
      color: var(--text-muted);
    }

    .card.disabled::before {
      background: var(--text-muted);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2.5rem;
      }

      .grid-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>我的工具儀表板</h1>
    <p>選擇您想使用的服務與工具</p>
  </header>

  <div class="grid-container">
    <!-- Tool 1: TPASS1200 Calculator -->
    <a href="TPASS1200.html" target="_blank" class="card">
      <div class="card-icon">📅</div>
      <h2>TPASS 1200 月票計算機</h2>
      <p>一個實用的工具，幫助您計算並視覺化基北北桃 1200 交通月票的每個使用週期（每30天）。</p>
      <div class="card-action">
        新視窗開啟 <span>→</span>
      </div>
    </a>

    <!-- Tool 2: AES Encryption -->
    <a href="https://leo20035.github.io/encrypt/encrypt.html" target="_blank" class="card">
      <div class="card-icon">🔐</div>
      <h2>AES 加解密工具</h2>
      <p>提供安全便捷的線上 AES 加密與解密服務，保護您的私密資料與文字內容。</p>
      <div class="card-action">
        新視窗開啟 <span>→</span>
      </div>
    </a>
  </div>

</body>

</html>
